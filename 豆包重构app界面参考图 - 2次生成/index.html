<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>记账APP科幻主题UI框架</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.1/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.1/css/v4-shims.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        lightSci: {
                            primary: '#4A89DC',
                            bg: '#F0F8FF',
                            card: 'rgba(255,255,255,0.85)'
                        },
                        horseSci: {
                            primary: '#D64040',
                            gold: '#E6C278',
                            bg: '#F8E8F8',
                            card: 'rgba(255,255,255,0.75)'
                        }
                    },
                    fontFamily: {
                        inter: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .glass-card {
                backdrop-filter: blur(12px);
                -webkit-backdrop-filter: blur(12px);
                border: 1px solid rgba(255,255,255,0.2);
            }
            .page-bg {
                background-size: cover;
                background-position: center;
                background-repeat: no-repeat;
            }
            .btn-hover {
                transition: all 0.3s ease;
            }
            .btn-hover:hover {
                transform: scale(1.05);
                box-shadow: 0 8px 25px rgba(0,0,0,0.15);
            }
        }
    </style>
</head>
<body class="font-inter overflow-hidden select-none">
    <!-- 主题切换栏 -->
    <div class="fixed top-0 left-0 right-0 z-50 glass-card bg-white/70">
        <div class="flex items-center justify-between px-4 py-3">
            <h1 class="text-lg font-bold text-gray-800">记账APP UI框架</h1>
            <div class="flex gap-2">
                <button id="lightThemeBtn" class="px-3 py-1 rounded-full bg-lightSci-primary text-white text-sm btn-hover">浅色科幻</button>
                <button id="horseThemeBtn" class="px-3 py-1 rounded-full bg-horseSci-primary text-white text-sm btn-hover">马年科幻</button>
            </div>
        </div>
    </div>

    <!-- 页面容器 -->
    <div class="pt-16 h-screen w-full">
        <!-- 浅色科幻主题页面 -->
        <div id="lightThemePages" class="h-full w-full">
            <!-- 页面导航栏 -->
            <div class="fixed bottom-0 left-0 right-0 z-40 glass-card bg-white/80">
                <div class="flex justify-around items-center py-2">
                    <button class="page-btn flex flex-col items-center py-2 text-lightSci-primary" data-page="light-ai">
                        <i class="fas fa-comments text-xl"></i>
                        <span class="text-xs mt-1">AI管家</span>
                    </button>
                    <button class="page-btn flex flex-col items-center py-2 text-gray-500" data-page="light-edit">
                        <i class="fas fa-edit text-xl"></i>
                        <span class="text-xs mt-1">记账编辑</span>
                    </button>
                    <button class="page-btn flex flex-col items-center py-2 text-gray-500" data-page="light-budget">
                        <i class="fas fa-chart-pie text-xl"></i>
                        <span class="text-xs mt-1">预算设置</span>
                    </button>
                    <button class="page-btn flex flex-col items-center py-2 text-gray-500" data-page="light-category">
                        <i class="fas fa-tags text-xl"></i>
                        <span class="text-xs mt-1">分类管理</span>
                    </button>
                </div>
            </div>

            <!-- AI管家页 -->
            <div id="light-ai" class="page page-bg h-full w-full" style="background-image: url('https://aka.doubaocdn.com/s/xVUl1wDFbp')">
                <!-- 这里可以添加交互元素，比如输入框 -->
                <div class="absolute bottom-20 left-4 right-4">
                    <div class="glass-card bg-white/90 rounded-2xl px-4 py-3 flex items-center gap-2">
                        <input type="text" placeholder="和AI管家聊聊记账..." class="w-full outline-none bg-transparent text-gray-800">
                        <button class="bg-lightSci-primary text-white rounded-full p-2 btn-hover">
                            <i class="fas fa-paper-plane"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- 记账编辑页 -->
            <div id="light-edit" class="page page-bg h-full w-full hidden" style="background-image: url('https://aka.doubaocdn.com/s/1Mu71wDFbl')">
                <!-- 这里可以添加表单元素占位 -->
                <div class="absolute top-4 left-4 right-4">
                    <div class="glass-card bg-white/85 rounded-2xl p-4 mb-4">
                        <h2 class="text-lg font-semibold text-gray-800 mb-3">记账编辑</h2>
                        <div class="space-y-3">
                            <div class="glass-card bg-white/70 rounded-xl p-3">
                                <label class="text-sm text-gray-600">金额</label>
                                <input type="number" class="w-full mt-1 outline-none bg-transparent text-gray-800">
                            </div>
                            <div class="glass-card bg-white/70 rounded-xl p-3">
                                <label class="text-sm text-gray-600">分类</label>
                                <select class="w-full mt-1 outline-none bg-transparent text-gray-800">
                                    <option>请选择分类</option>
                                    <option>餐饮</option>
                                    <option>交通</option>
                                    <option>购物</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 预算设置页 -->
            <div id="light-budget" class="page page-bg h-full w-full hidden" style="background-image: url('https://aka.doubaocdn.com/s/8Hyw1wDFbl')">
                <!-- 预算设置占位 -->
                <div class="absolute top-4 left-4 right-4">
                    <div class="glass-card bg-white/85 rounded-2xl p-4">
                        <h2 class="text-lg font-semibold text-gray-800 mb-3">月度预算</h2>
                        <div class="space-y-4">
                            <div class="flex justify-between items-center">
                                <span class="text-gray-700">总预算</span>
                                <span class="text-xl font-bold text-lightSci-primary">¥5000</span>
                            </div>
                            <div class="w-full bg-gray-200 rounded-full h-2">
                                <div class="bg-lightSci-primary h-2 rounded-full" style="width: 65%"></div>
                            </div>
                            <div class="text-sm text-gray-600">已使用 ¥3250，剩余 ¥1750</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 分类管理页 -->
            <div id="light-category" class="page page-bg h-full w-full hidden" style="background-image: url('https://aka.doubaocdn.com/s/mvQn1wDFbi')">
                <!-- 分类管理占位 -->
                <div class="absolute top-4 left-4 right-4 bottom-20">
                    <div class="grid grid-cols-3 gap-3">
                        <div class="glass-card bg-white/80 rounded-xl p-3 flex flex-col items-center btn-hover">
                            <i class="fas fa-utensils text-2xl text-lightSci-primary mb-2"></i>
                            <span class="text-sm text-gray-700">餐饮</span>
                        </div>
                        <div class="glass-card bg-white/80 rounded-xl p-3 flex flex-col items-center btn-hover">
                            <i class="fas fa-bus text-2xl text-lightSci-primary mb-2"></i>
                            <span class="text-sm text-gray-700">交通</span>
                        </div>
                        <div class="glass-card bg-white/80 rounded-xl p-3 flex flex-col items-center btn-hover">
                            <i class="fas fa-shopping-bag text-2xl text-lightSci-primary mb-2"></i>
                            <span class="text-sm text-gray-700">购物</span>
                        </div>
                        <div class="glass-card bg-white/80 rounded-xl p-3 flex flex-col items-center btn-hover">
                            <i class="fas fa-home text-2xl text-lightSci-primary mb-2"></i>
                            <span class="text-sm text-gray-700">住房</span>
                        </div>
                        <div class="glass-card bg-white/80 rounded-xl p-3 flex flex-col items-center btn-hover">
                            <i class="fas fa-book text-2xl text-lightSci-primary mb-2"></i>
                            <span class="text-sm text-gray-700">学习</span>
                        </div>
                        <div class="glass-card bg-white/80 rounded-xl p-3 flex flex-col items-center btn-hover">
                            <i class="fas fa-plus text-2xl text-lightSci-primary mb-2"></i>
                            <span class="text-sm text-gray-700">添加分类</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 马年科幻主题页面 -->
        <div id="horseThemePages" class="h-full w-full hidden">
            <!-- 页面导航栏 -->
            <div class="fixed bottom-0 left-0 right-0 z-40 glass-card bg-white/80">
                <div class="flex justify-around items-center py-2">
                    <button class="page-btn flex flex-col items-center py-2 text-horseSci-primary" data-page="horse-ai">
                        <i class="fas fa-comments text-xl"></i>
                        <span class="text-xs mt-1">AI管家</span>
                    </button>
                    <button class="page-btn flex flex-col items-center py-2 text-gray-500" data-page="horse-edit">
                        <i class="fas fa-edit text-xl"></i>
                        <span class="text-xs mt-1">记账编辑</span>
                    </button>
                    <button class="page-btn flex flex-col items-center py-2 text-gray-500" data-page="horse-budget">
                        <i class="fas fa-chart-pie text-xl"></i>
                        <span class="text-xs mt-1">预算设置</span>
                    </button>
                    <button class="page-btn flex flex-col items-center py-2 text-gray-500" data-page="horse-category">
                        <i class="fas fa-tags text-xl"></i>
                        <span class="text-xs mt-1">分类管理</span>
                    </button>
                </div>
            </div>

            <!-- AI管家页 -->
            <div id="horse-ai" class="page page-bg h-full w-full" style="background-image: url('https://aka.doubaocdn.com/s/YVJk1wDFcA')">
                <!-- 这里可以添加交互元素，比如输入框 -->
                <div class="absolute bottom-20 left-4 right-4">
                    <div class="glass-card bg-white/90 rounded-2xl px-4 py-3 flex items-center gap-2">
                        <input type="text" placeholder="和AI管家聊聊记账..." class="w-full outline-none bg-transparent text-gray-800">
                        <button class="bg-horseSci-primary text-white rounded-full p-2 btn-hover">
                            <i class="fas fa-paper-plane"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- 记账编辑页 -->
            <div id="horse-edit" class="page page-bg h-full w-full hidden" style="background-image: url('https://aka.doubaocdn.com/s/ViRV1wDFcA')">
                <!-- 这里可以添加表单元素占位 -->
                <div class="absolute top-4 left-4 right-4">
                    <div class="glass-card bg-white/85 rounded-2xl p-4 mb-4">
                        <h2 class="text-lg font-semibold text-gray-800 mb-3">记账编辑</h2>
                        <div class="space-y-3">
                            <div class="glass-card bg-white/70 rounded-xl p-3">
                                <label class="text-sm text-gray-600">金额</label>
                                <input type="number" class="w-full mt-1 outline-none bg-transparent text-gray-800">
                            </div>
                            <div class="glass-card bg-white/70 rounded-xl p-3">
                                <label class="text-sm text-gray-600">分类</label>
                                <select class="w-full mt-1 outline-none bg-transparent text-gray-800">
                                    <option>请选择分类</option>
                                    <option>餐饮</option>
                                    <option>交通</option>
                                    <option>购物</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 预算设置页 -->
            <div id="horse-budget" class="page page-bg h-full w-full hidden" style="background-image: url('https://aka.doubaocdn.com/s/qThQ1wDFcA')">
                <!-- 预算设置占位 -->
                <div class="absolute top-4 left-4 right-4">
                    <div class="glass-card bg-white/85 rounded-2xl p-4">
                        <h2 class="text-lg font-semibold text-gray-800 mb-3">月度预算</h2>
                        <div class="space-y-4">
                            <div class="flex justify-between items-center">
                                <span class="text-gray-700">总预算</span>
                                <span class="text-xl font-bold text-horseSci-primary">¥5000</span>
                            </div>
                            <div class="w-full bg-gray-200 rounded-full h-2">
                                <div class="bg-horseSci-primary h-2 rounded-full" style="width: 65%"></div>
                            </div>
                            <div class="text-sm text-gray-600">已使用 ¥3250，剩余 ¥1750</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 分类管理页 -->
            <div id="horse-category" class="page page-bg h-full w-full hidden" style="background-image: url('https://aka.doubaocdn.com/s/RRVD1wDFcC')">
                <!-- 分类管理占位 -->
                <div class="absolute top-4 left-4 right-4 bottom-20">
                    <div class="grid grid-cols-3 gap-3">
                        <div class="glass-card bg-white/80 rounded-xl p-3 flex flex-col items-center btn-hover">
                            <i class="fas fa-utensils text-2xl text-horseSci-primary mb-2"></i>
                            <span class="text-sm text-gray-700">餐饮</span>
                        </div>
                        <div class="glass-card bg-white/80 rounded-xl p-3 flex flex-col items-center btn-hover">
                            <i class="fas fa-bus text-2xl text-horseSci-primary mb-2"></i>
                            <span class="text-sm text-gray-700">交通</span>
                        </div>
                        <div class="glass-card bg-white/80 rounded-xl p-3 flex flex-col items-center btn-hover">
                            <i class="fas fa-shopping-bag text-2xl text-horseSci-primary mb-2"></i>
                            <span class="text-sm text-gray-700">购物</span>
                        </div>
                        <div class="glass-card bg-white/80 rounded-xl p-3 flex flex-col items-center btn-hover">
                            <i class="fas fa-home text-2xl text-horseSci-primary mb-2"></i>
                            <span class="text-sm text-gray-700">住房</span>
                        </div>
                        <div class="glass-card bg-white/80 rounded-xl p-3 flex flex-col items-center btn-hover">
                            <i class="fas fa-book text-2xl text-horseSci-primary mb-2"></i>
                            <span class="text-sm text-gray-700">学习</span>
                        </div>
                        <div class="glass-card bg-white/80 rounded-xl p-3 flex flex-col items-center btn-hover">
                            <i class="fas fa-plus text-2xl text-horseSci-primary mb-2"></i>
                            <span class="text-sm text-gray-700">添加分类</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 主题切换功能
        const lightThemeBtn = document.getElementById('lightThemeBtn');
        const horseThemeBtn = document.getElementById('horseThemeBtn');
        const lightThemePages = document.getElementById('lightThemePages');
        const horseThemePages = document.getElementById('horseThemePages');

        lightThemeBtn.addEventListener('click', () => {
            lightThemePages.classList.remove('hidden');
            horseThemePages.classList.add('hidden');
            lightThemeBtn.classList.add('bg-lightSci-primary');
            lightThemeBtn.classList.remove('bg-gray-500');
            horseThemeBtn.classList.add('bg-gray-500');
            horseThemeBtn.classList.remove('bg-horseSci-primary');
        });

        horseThemeBtn.addEventListener('click', () => {
            horseThemePages.classList.remove('hidden');
            lightThemePages.classList.add('hidden');
            horseThemeBtn.classList.add('bg-horseSci-primary');
            horseThemeBtn.classList.remove('bg-gray-500');
            lightThemeBtn.classList.add('bg-gray-500');
            lightThemeBtn.classList.remove('bg-lightSci-primary');
        });

        // 页面切换功能
        const pageBtns = document.querySelectorAll('.page-btn');
        const pages = document.querySelectorAll('.page');

        pageBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                // 重置所有按钮样式
                pageBtns.forEach(b => {
                    if (b.closest('#lightThemePages')) {
                        b.classList.remove('text-lightSci-primary');
                        b.classList.add('text-gray-500');
                    } else {
                        b.classList.remove('text-horseSci-primary');
                        b.classList.add('text-gray-500');
                    }
                });
                // 设置当前按钮样式
                if (btn.closest('#lightThemePages')) {
                    btn.classList.add('text-lightSci-primary');
                    btn.classList.remove('text-gray-500');
                } else {
                    btn.classList.add('text-horseSci-primary');
                    btn.classList.remove('text-gray-500');
                }

                // 隐藏所有页面
                pages.forEach(page => {
                    page.classList.add('hidden');
                });
                // 显示当前页面
                const targetPage = document.getElementById(btn.getAttribute('data-page'));
                if (targetPage) {
                    targetPage.classList.remove('hidden');
                }
            });
        });

        // 初始化页面
        window.addEventListener('load', () => {
            // 确保第一个页面显示
            const firstPage = document.querySelector('.page:not(.hidden)');
            if (firstPage) {
                firstPage.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
