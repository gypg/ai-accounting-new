name: Build and Release APK

permissions:
  contents: write

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  lint:
    name: Lint Check
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Run Android Lint
      run: ./gradlew lintDebug --continue

    - name: Upload Lint Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: lint-report
        path: app/build/reports/lint-results-debug.html
        retention-days: 14

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Run Unit Tests
      run: ./gradlew testDebugUnitTest --continue

    - name: Upload Test Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-report
        path: app/build/reports/tests/testDebugUnitTest/
        retention-days: 14

  build:
    name: Build APK
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Build Release APK
      run: ./gradlew assembleRelease

    - name: Rename APKs
      run: |
        VERSION=$(grep 'versionName' app/build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
        DATE=$(date +%Y%m%d)
        mkdir -p artifacts
        cp app/build/outputs/apk/debug/app-debug.apk "artifacts/AI记账_v${VERSION}_debug_${DATE}.apk"

        RELEASE_APK=""
        if [ -f app/build/outputs/apk/release/app-release.apk ]; then
          RELEASE_APK="app/build/outputs/apk/release/app-release.apk"
        elif [ -f app/build/outputs/apk/release/app-release-unsigned.apk ]; then
          RELEASE_APK="app/build/outputs/apk/release/app-release-unsigned.apk"
        fi

        if [ -z "$RELEASE_APK" ]; then
          echo "Release APK not found in expected output paths"
          exit 1
        fi

        cp "$RELEASE_APK" "artifacts/AI记账_v${VERSION}_release_${DATE}.apk"

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: debug-apk
        path: artifacts/*debug*.apk
        retention-days: 30

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: release-apk
        path: artifacts/*release*.apk
        retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
    - uses: actions/checkout@v4

    - name: Download APKs
      uses: actions/download-artifact@v4
      with:
        path: ./apk
        merge-multiple: true

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: ./apk/*.apk
        body: |
          ## AI记账 ${{ github.ref_name }}

          ### 下载说明
          - **debug.apk**: Debug 版本（推荐测试使用）
          - **release.apk**: Release 版本（未签名）

          ### 变更内容
          详见 commit 记录。
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
